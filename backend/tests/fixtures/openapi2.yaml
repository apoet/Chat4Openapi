swagger: "2.0"
info:
  title: Pet API
  version: "1.0"
host: api.example.test
basePath: /v1
schemes: [https]
consumes: [application/json]
produces: [application/json]
paths:
  /pets:
    post:
      operationId: createPet
      summary: Create a pet
      parameters:
        - name: trace
          in: query
          required: false
          type: string
        - name: pet
          in: body
          required: true
          schema:
            $ref: "#/definitions/PetInput"
      responses:
        "200":
          description: Created pet
          schema:
            $ref: "#/definitions/Pet"
definitions:
  PetInput:
    type: object
    required: [name]
    properties:
      name:
        type: string
  Pet:
    allOf:
      - $ref: "#/definitions/PetInput"
      - type: object
        properties:
          id:
            type: integer
